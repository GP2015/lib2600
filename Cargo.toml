[workspace]
resolver = "3"
members = ["emucore"]

[workspace.package]
edition = "2024"

[workspace.dependencies]
itertools = { version = "0.14.0", default-features = false }
rstest = "0.26.1"
strum_macros = "0.28.0"
heapless = "0.9.3"
thiserror = { version = "2.0.18", default-features = false }

[profile.release]
lto = "fat"
codegen-units = 1
